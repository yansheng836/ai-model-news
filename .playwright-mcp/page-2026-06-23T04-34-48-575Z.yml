      - list [ref=e134]:
        - listitem [ref=e135]:
          - text: ▸
          - code [ref=e136]: WebSearch
          - text: 工具不可靠 — 返回的是模型生成的文本，而非真实搜索结果
        - listitem [ref=e137]:
          - text: ▸
          - code [ref=e138]: WebFetch
          - text: 工具部分可用 — 访问官方 API 文档通常有效，但很多网站会返回 403 或需要认证
        - listitem [ref=e139]: ▸ Fetch MCP 提供的工具进行搜索。
        - listitem [ref=e140]:
          - text: ▸
          - strong [ref=e141]: 解决方案
          - text: ：优先使用
          - code [ref=e142]: WebFetch
          - text: 访问各厂商官方 API 文档页面
