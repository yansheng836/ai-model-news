    - article [ref=e101]:
      - heading "ai-model-news" [level=1] [ref=e102]:
        - link "ai-model-news" [ref=e103] [cursor=pointer]:
          - /url: "#/README?id=ai-model-news"
      - paragraph [ref=e104]: 该项目用于整理现在市面上的流行的各个厂家的大模型产品，进行对比。
      - paragraph [ref=e105]: 每个厂家一个md介绍文件，需要介绍公司、及对应的大模型，大模型需要有各版本发布时间、版本特点等。
      - paragraph [ref=e106]: 同时将所有厂家的大模型的发版时间整理到README.md文档中，一览无遗，需要包括公司所在国家、公司名、大模型名称、版本、发版时间。
      - blockquote [ref=e107]:
        - paragraph [ref=e108]:
          - text: ⚠️
          - strong [ref=e109]: 数据说明
          - text: ：本项目数据截止至
          - strong [ref=e110]: 2026年6月20日
          - text: ，通过
          - code [ref=e111]: WebFetch
          - text: 抓取各厂商官方文档更新。已验证更新的厂商包括：Anthropic、OpenAI、Google、xAI、Mistral、DeepSeek、阿里巴巴、Meta、NVIDIA、智谱AI、月之暗面、百度、腾讯、字节跳动、科大讯飞、华为。部分厂商数据可能仍有遗漏，欢迎补充更新。
      - heading "问题" [level=2] [ref=e112]:
        - link "问题" [ref=e113] [cursor=pointer]:
          - /url: "#/README?id=%e9%97%ae%e9%a2%98"
      - paragraph [ref=e114]: 我发现了一些问题：
      - paragraph [ref=e115]: 1.消息严重滞后，今天是 2026年6月20日，但是最新版的大模型时间是 2025年5-6月，需要搜索新闻进行内容更新，大模型迭代非常快。
      - paragraph [ref=e116]: 2.需要精确到 具体模型的版本，比如 Claude 4 Opus，这个就太笼统了，需要精确到 Claude 4 Opus 4.7 这样。
      - paragraph [ref=e117]: 3.需要特别注明模型的功能属性，比如 多模型、纯文本模型、文生图、文生视屏、试图、语音模型等。
      - paragraph [ref=e118]: 4.需要注明 模型的参数，启动参数，上下文长度。
      - paragraph [ref=e119]: 5.文档命名规则：国家-公司-该公司经典大模型名称.md，例如：中国-深度求索-DeepSeek.md
      - paragraph [ref=e120]: 6.各个文档里面，除了总览，还需要有该模型的具体的介绍。
      - paragraph [ref=e121]:
        - text: "7."
        - strong [ref=e122]: 发布时间必须精确到天或月
        - text: ，不能只标注年份或时间范围。 格式：
        - code [ref=e123]: YYYY年MM月DD日
        - text: 或
        - code [ref=e124]: YYYY年MM月
        - text: 正确示例：
        - code [ref=e125]: 2025年8月7日
        - text: 、
        - code [ref=e126]: 2026年3月
        - text: 错误示例：
        - code [ref=e127]: 2025年
        - text: 、
        - code [ref=e128]: 2025-2026年
        - text: 、
        - code [ref=e129]: 2024年下半年
      - heading "数据更新策略" [level=2] [ref=e130]:
        - link "数据更新策略" [ref=e131] [cursor=pointer]:
          - /url: "#/README?id=%e6%95%b0%e6%8d%ae%e6%9b%b4%e6%96%b0%e7%ad%96%e7%95%a5"
      - heading "工具限制说明" [level=3] [ref=e132]:
        - link "工具限制说明" [ref=e133] [cursor=pointer]:
