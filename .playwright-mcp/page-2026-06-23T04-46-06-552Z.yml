      - heading "模型详细介绍" [level=2] [ref=e393]:
        - link "模型详细介绍" [ref=e394] [cursor=pointer]:
          - /url: "#/%E4%B8%AD%E5%9B%BD-%E6%B7%B1%E5%BA%A6%E6%B1%82%E7%B4%A2-DeepSeek?id=%e6%a8%a1%e5%9e%8b%e8%af%a6%e7%bb%86%e4%bb%8b%e7%bb%8d"
      - heading "DeepSeek LLM 67B（2024年1月）" [level=3] [ref=e395]:
        - link "DeepSeek LLM 67B（2024年1月）" [ref=e396] [cursor=pointer]:
          - /url: "#/%E4%B8%AD%E5%9B%BD-%E6%B7%B1%E5%BA%A6%E6%B1%82%E7%B4%A2-DeepSeek?id=deepseek-llm-67b%ef%bc%882024%e5%b9%b41%e6%9c%88%ef%bc%89"
      - paragraph [ref=e397]: 深度求索首个开源模型，67B参数稠密模型，4K上下文。在多项基准上表现出色，奠定了DeepSeek开源模型的基础。
      - heading "DeepSeek Coder V1（2024年1月）" [level=3] [ref=e398]:
        - link "DeepSeek Coder V1（2024年1月）" [ref=e399] [cursor=pointer]:
          - /url: "#/%E4%B8%AD%E5%9B%BD-%E6%B7%B1%E5%BA%A6%E6%B1%82%E7%B4%A2-DeepSeek?id=deepseek-coder-v1%ef%bc%882024%e5%b9%b41%e6%9c%88%ef%bc%89"
      - paragraph [ref=e400]: 首个代码专用模型，支持多种编程语言的代码生成和理解。
      - heading "DeepSeek-VL（2024年3月）" [level=3] [ref=e401]:
        - link "DeepSeek-VL（2024年3月）" [ref=e402] [cursor=pointer]:
          - /url: "#/%E4%B8%AD%E5%9B%BD-%E6%B7%B1%E5%BA%A6%E6%B1%82%E7%B4%A2-DeepSeek?id=deepseek-vl%ef%bc%882024%e5%b9%b43%e6%9c%88%ef%bc%89"
      - paragraph [ref=e403]: 首个视觉语言模型，结合视觉理解和文本生成能力，支持图像描述、视觉问答等任务。
      - heading "DeepSeek-V2（2024年5月）" [level=3] [ref=e404]:
        - link "DeepSeek-V2（2024年5月）" [ref=e405] [cursor=pointer]:
          - /url: "#/%E4%B8%AD%E5%9B%BD-%E6%B7%B1%E5%BA%A6%E6%B1%82%E7%B4%A2-DeepSeek?id=deepseek-v2%ef%bc%882024%e5%b9%b45%e6%9c%88%ef%bc%89"
      - paragraph [ref=e406]: 首个采用MoE架构的版本，236B总参数仅21B激活，大幅降低推理成本。创新性地使用了多头潜在注意力（MLA）机制，在保持性能的同时显著减少KV Cache内存占用。
      - heading "DeepSeek-V2-Lite（2024年5月）" [level=3] [ref=e407]:
        - link "DeepSeek-V2-Lite（2024年5月）" [ref=e408] [cursor=pointer]:
          - /url: "#/%E4%B8%AD%E5%9B%BD-%E6%B7%B1%E5%BA%A6%E6%B1%82%E7%B4%A2-DeepSeek?id=deepseek-v2-lite%ef%bc%882024%e5%b9%b45%e6%9c%88%ef%bc%89"
      - paragraph [ref=e409]: V2的轻量版本，15.7B MoE架构仅2.4B激活参数，适合资源受限场景。
      - heading "DeepSeek-V3" [level=3] [ref=e410]:
        - link "DeepSeek-V3" [ref=e411] [cursor=pointer]:
          - /url: "#/%E4%B8%AD%E5%9B%BD-%E6%B7%B1%E5%BA%A6%E6%B1%82%E7%B4%A2-DeepSeek?id=deepseek-v3"
      - paragraph [ref=e412]: 671B参数MoE模型，37B激活，256个专家。最大亮点是训练成本仅$5.5M（使用2048块H800 GPU训练约2个月），是同级别模型成本的几分之一。采用FP8训练、Multi-Token Prediction（MTP）等创新技术。在多项基准上与GPT-4o竞争。V3-Base是预训练基座模型（无SFT/RL后训练）。
      - heading "DeepSeek-R1" [level=3] [ref=e413]:
        - link "DeepSeek-R1" [ref=e414] [cursor=pointer]:
          - /url: "#/%E4%B8%AD%E5%9B%BD-%E6%B7%B1%E5%BA%A6%E6%B1%82%E7%B4%A2-DeepSeek?id=deepseek-r1"
      - paragraph [ref=e415]: 深度推理模型，对标OpenAI o1。采用强化学习训练，具备链式思维推理能力。在数学（AIME 2024得分79.8%，MATH-500得分97.3%）、编程（Codeforces评分2029）等任务上达到或超越o1水平。R1-Zero版本完全通过强化学习训练（无监督微调），展示了纯RL训练推理能力的可行性。V3通过从R1系列模型蒸馏知识来增强推理能力。
      - heading "蒸馏模型系列" [level=3] [ref=e416]:
        - link "蒸馏模型系列" [ref=e417] [cursor=pointer]:
          - /url: "#/%E4%B8%AD%E5%9B%BD-%E6%B7%B1%E5%BA%A6%E6%B1%82%E7%B4%A2-DeepSeek?id=%e8%92%b8%e9%a6%8f%e6%a8%a1%e5%9e%8b%e7%b3%bb%e5%88%97"
      - paragraph [ref=e418]: 将R1的推理能力蒸馏到更小的模型中（1.5B/7B/8B/14B/32B/70B），使小模型也能具备强推理能力。其中DeepSeek-R1-Distill-Qwen-32B在多项推理基准上超越了o1-mini。
      - heading "DeepSeek-V3.2" [level=3] [ref=e419]:
        - link "DeepSeek-V3.2" [ref=e420] [cursor=pointer]:
          - /url: "#/%E4%B8%AD%E5%9B%BD-%E6%B7%B1%E5%BA%A6%E6%B1%82%E7%B4%A2-DeepSeek?id=deepseek-v32"
      - paragraph [ref=e421]: V3的重大升级版本，685B参数MoE架构。2025年12月发布，包含标准版和Speciale特别版。在多项基准测试中表现优异。
      - heading "DeepSeek-V4系列（2026年）" [level=3] [ref=e422]:
